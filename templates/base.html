<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}PyTunes{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a href="{{ url_for('index') }}" class="brand">🎵 PyTunes</a>
  </header>
  <main class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}<p class="flash">{{ message }}</p>{% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
